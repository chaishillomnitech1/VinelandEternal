name: Deploy Agape — VinelandEternal CI/CD

on:
  push:
    branches: [main, "copilot/**"]
  pull_request:
    branches: [main]
  schedule:
    # Runs daily at 05:00 UTC (Vineland Dawn Pulse)
    - cron: "0 5 * * *"
  workflow_dispatch:

# ---------------------------------------------------------------------------
# Permissions — minimal required set
# ---------------------------------------------------------------------------
permissions:
  contents: read

jobs:
  # -------------------------------------------------------------------------
  # 1. Lint & static analysis
  # -------------------------------------------------------------------------
  lint:
    name: Lint (Python + JS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python linting tools
        run: pip install flake8

      - name: Flake8 — IoT Agape module
        run: flake8 iot-agape/ --max-line-length=100 --ignore=E501,W503

      - name: Flake8 — Drone Alchemy module
        run: flake8 drone-alchemy/ --max-line-length=100 --ignore=E501,W503

      - name: Flake8 — Zaire Axis module
        run: flake8 zaire-axis/ --max-line-length=100 --ignore=E501,W503

      - name: Flake8 — Cosmic Co-Op module
        run: flake8 cosmic-coop/ --max-line-length=100 --ignore=E501,W503

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Node linting tools
        run: npm install -g eslint

      - name: ESLint — Drone Alchemy
        run: |
          echo '{"env":{"node":true,"es2022":true},"parserOptions":{"ecmaVersion":2022},"rules":{"no-unused-vars":"warn","no-console":"off"}}' > /tmp/.eslintrc.json
          eslint drone-alchemy/flight-mint.js --no-eslintrc -c /tmp/.eslintrc.json || true

      - name: ESLint — AR Harvest Visor
        run: |
          eslint ar-harvest-visor/gold-rivers.js --no-eslintrc -c /tmp/.eslintrc.json || true

      - name: ESLint — Cosmic Co-Op
        run: |
          eslint cosmic-coop/heart-map.js --no-eslintrc -c /tmp/.eslintrc.json || true

  # -------------------------------------------------------------------------
  # 2. Python unit tests
  # -------------------------------------------------------------------------
  test-python:
    name: Python Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install flask paho-mqtt fastapi uvicorn sqlalchemy httpx requests pulp eth-account gitpython networkx

      - name: Run sensor dashboard tests
        run: |
          python -c "
          import sys, importlib.util
          spec = importlib.util.spec_from_file_location('sensor_dashboard', 'iot-agape/sensor-dashboard.py')
          m = importlib.util.module_from_spec(spec)
          sys.modules['sensor_dashboard'] = m
          spec.loader.exec_module(m)
          assert m._compute_agape_value(85, 72, 92) == 82, 'Agape score mismatch'
          assert m._compute_agape_value(100, 100, 100) == 100, 'Agape max failed'
          assert m._compute_agape_value(0, 0, 0) == 0, 'Agape zero failed'
          client = m.app.test_client()
          resp = client.get('/api/agape/tray1')
          assert resp.status_code == 200
          assert resp.get_json()['tray_id'] == 'tray1'
          assert client.get('/api/agape/nonexistent').status_code == 404
          assert len(client.get('/api/agape').get_json()) == len(m.sensors)
          # location field present on all trays
          for t in client.get('/api/agape').get_json():
              assert 'location' in t, f'location missing from {t[\"tray_id\"]}'
          print('sensor-dashboard.py: all tests passed')
          "

      - name: Run region and nexus-status endpoint tests
        run: |
          python -c "
          import sys, importlib.util
          spec = importlib.util.spec_from_file_location('sensor_dashboard', 'iot-agape/sensor-dashboard.py')
          m = importlib.util.module_from_spec(spec)
          sys.modules['sensor_dashboard'] = m
          spec.loader.exec_module(m)
          client = m.app.test_client()

          # Region filtering
          r = client.get('/api/agape/region/Vineland')
          assert r.status_code == 200
          nj = r.get_json()
          assert len(nj) == 5, f'Expected 5 NJ trays, got {len(nj)}'

          r = client.get('/api/agape/region/Seattle')
          assert r.status_code == 200, r.data
          sea = r.get_json()
          assert len(sea) == 2, f'Expected 2 Seattle trays, got {len(sea)}'

          r = client.get('/api/agape/region/Portland')
          assert r.status_code == 200
          assert len(r.get_json()) == 2

          r = client.get('/api/agape/region/San Francisco')
          assert r.status_code == 200
          assert len(r.get_json()) == 2

          assert client.get('/api/agape/region/nowhere').status_code == 404

          # Nexus status summary
          r = client.get('/api/nexus/status')
          assert r.status_code == 200
          ns = r.get_json()
          assert ns['total_trays'] == len(m.sensors)
          assert ns['regions_active'] == 4
          assert 'region_breakdown' in ns
          print('region + nexus-status endpoints: all tests passed')
          "

      - name: Run grid optimizer tests
        run: |
          python -c "
          import sys, importlib.util
          spec = importlib.util.spec_from_file_location('grid_optimizer', 'drone-alchemy/grid-optimizer.py')
          m = importlib.util.module_from_spec(spec)
          sys.modules['grid_optimizer'] = m
          spec.loader.exec_module(m)
          d = m.haversine_km(39.4862, -75.0255, 39.9526, -75.1652)
          assert 40 < d < 80, f'Haversine out of range: {d}'
          c = m.carbon_saved_g(5.0, 500.0)
          assert c > 0
          # Regions registry
          assert m.DEFAULT_NODES is m.EAST_COAST_NODES
          assert 'east-coast' in m.REGIONS and 'west-coast' in m.REGIONS
          wc_ids = {n.node_id for n in m.WEST_COAST_NODES}
          assert 'seattle' in wc_ids and 'portland' in wc_ids and 'sf' in wc_ids
          # Deep copy prevents mutation of canonical list
          wc1 = m.get_nodes_for_region('west-coast')
          wc2 = m.get_nodes_for_region('west-coast')
          assert wc1 is not wc2
          print(f'grid-optimizer.py: haversine={d:.1f} km, carbon_saved={c:.1f} g, West Coast nodes={len(wc_ids)} — passed')
          "

      - name: Run grant automation tests
        run: |
          python -c "
          import sys, importlib.util
          spec = importlib.util.spec_from_file_location('grant_automation', 'cosmic-coop/grant-automation.py')
          m = importlib.util.module_from_spec(spec)
          sys.modules['grant_automation'] = m
          spec.loader.exec_module(m)
          payload = m.build_application_payload(m.GRANTS['scbgp'], m.ApplicantProfile())
          assert payload['finalized'] is True
          assert 'applicant' in payload
          assert len(payload['project']['crops']) > 0
          # West Coast grants
          for key in ('wa_scbgp', 'or_scbgp', 'ca_cdfa'):
              g = m.GRANTS[key]
              p = m.build_application_payload(g, m.ApplicantProfile())
              assert p['finalized'] is True, f'{key} payload not finalized'
          assert len(m.GRANTS) == 7
          print('grant-automation.py: all grants valid — passed')
          "

      - name: Run patent automation tests
        run: |
          python -c "
          import sys, importlib.util
          spec = importlib.util.spec_from_file_location('patent_automation', 'cosmic-coop/patent-automation.py')
          m = importlib.util.module_from_spec(spec)
          sys.modules['patent_automation'] = m
          spec.loader.exec_module(m)
          # All 5 patents produce valid finalized payloads
          for key in m.PATENTS:
              p = m.build_filing_payload(m.PATENTS[key], m.InventorProfile())
              assert p['finalized'] is True, f'{key} payload not finalized'
              assert 'inventor' in p, f'{key} missing inventor'
              assert 'patent' in p, f'{key} missing patent block'
              assert p['patent']['claims_count'] > 0, f'{key} claims_count invalid'
          assert len(m.PATENTS) == 5
          print(f'patent-automation.py: {len(m.PATENTS)} patents valid — passed')
          "

      - name: Run lunar nexus tests
        run: |
          python -c "
          import sys, json
          from pathlib import Path
          sys.path.insert(0, 'cosmic-coop')
          import lunar_nexus as ln

          # JSON is valid and loadable
          data = ln.load_nexus_data()
          assert 'nodes' in data and 'edges' in data
          assert data['schema_version'] == '1.0'

          # Node counts
          nodes = ln.load_lunar_nodes()
          edges = ln.load_lunar_edges()
          assert len(nodes) >= 6, f'Expected ≥6 nodes, got {len(nodes)}'
          assert len(edges) >= 6, f'Expected ≥6 edges, got {len(edges)}'

          # Body filtering
          earth = ln.nodes_by_body('Earth')
          moon  = ln.nodes_by_body('Moon')
          assert len(earth) >= 3, f'Expected ≥3 Earth nodes, got {len(earth)}'
          assert len(moon)  >= 2, f'Expected ≥2 Moon nodes, got {len(moon)}'

          # Supply routes exist
          sr = ln.supply_routes()
          assert len(sr) >= 4, f'Expected ≥4 supply routes, got {len(sr)}'

          # Delta-v calculation
          dv = ln.total_delta_v('earth_vineland', 'lunar_base_south_pole')
          assert dv > 0, f'Delta-v must be positive, got {dv}'
          print(f'  earth_vineland → lunar_base_south_pole: {dv} km/s')

          # Dispatch readiness — below threshold
          ready, reason = ln.evaluate_dispatch_readiness(surplus_g=1000, avg_agape=80)
          assert not ready, 'Should not be ready with low surplus+agape'

          # Dispatch readiness — above threshold
          ready, reason = ln.evaluate_dispatch_readiness(surplus_g=6000, avg_agape=93)
          assert ready, f'Should be ready with high surplus+agape: {reason}'

          # networkx graph builds without error
          G = ln.build_lunar_graph()
          assert G.number_of_nodes() == len(nodes)
          assert G.number_of_edges() == len(edges)

          print(f'lunar_nexus.py: {len(nodes)} nodes, {len(edges)} edges, Δv={dv} km/s — passed')
          "

      - name: Run lunar dispatch simulation tests
        run: |
          python -c "
          import sys
          sys.path.insert(0, 'cosmic-coop')
          import lunar_dispatch_sim as lds

          # Live sensor data simulation
          result = lds.run_simulation()
          assert result.tray_count == 11, f'Expected 11 trays, got {result.tray_count}'
          assert result.surplus_tray_count > 0
          assert result.total_surplus_g > 0
          assert result.avg_agape > 0
          assert isinstance(result.dispatch_ready, bool)
          assert result.reason != ''
          assert len(result.manifests) >= 2, f'Expected ≥2 manifests, got {len(result.manifests)}'
          assert len(result.snapshots) == 11

          # Manifest sanity
          for m in result.manifests:
              assert m.seed_package_g >= 0
              assert m.transit_days > 0
              assert m.delta_v_km_s > 0

          # Custom single-tray high-yield scenario
          r2 = lds.run_simulation(
              sensors={'t1': {'crop': 'Basil', 'location': 'NJ', 'agape_value': 99}},
              tray_yield_g=1000,
          )
          assert r2.tray_count == 1
          assert r2.total_harvest_g == 990.0, f'Expected 990.0g, got {r2.total_harvest_g}'

          # Low agape scenario → not dispatch-ready
          r3 = lds.run_simulation(
              sensors={'t1': {'crop': 'Basil', 'location': 'NJ', 'agape_value': 40}},
          )
          assert not r3.dispatch_ready, 'Low agape should not be dispatch-ready'

          print(f'lunar_dispatch_sim.py: trays={result.tray_count}, '
                f'surplus={result.total_surplus_g}g, avg_agape={result.avg_agape}, '
                f'ready={result.dispatch_ready}, manifests={len(result.manifests)} — passed')
          "

      - name: Run zaire ledger API tests
        run: |
          python -c "
          import sys, importlib.util
          from fastapi.testclient import TestClient
          spec = importlib.util.spec_from_file_location('ledger_api', 'zaire-axis/ledger_api.py')
          m = importlib.util.module_from_spec(spec)
          sys.modules['ledger_api'] = m
          spec.loader.exec_module(m)
          client = TestClient(m.app)
          assert client.get('/health').status_code == 200
          r = client.post('/harvests', json={
            'tray_id': 'tray1', 'crop_type': 'Basil', 'harvest_g': 200.0,
            'water_ml': 100.0, 'sunlight_lux': 8000.0, 'soil_moisture': 70.0,
            'agape_value': 92.0
          })
          assert r.status_code == 201, r.text
          eid = r.json()['id']
          r = client.post(f'/tokens?harvest_event_id={eid}&zaire_balance=2.5')
          assert r.status_code == 201, r.text
          tid = r.json()['token_id']
          assert client.get(f'/tokens/{tid}').status_code == 200
          assert client.get('/balance').status_code == 200
          assert client.get('/metrics/agape').status_code == 200
          print('ledger_api.py: all API tests passed')
          "

      - name: Run claim endpoint tests
        run: |
          python -c "
          import sys, importlib.util
          from fastapi.testclient import TestClient
          from eth_account import Account
          from eth_account.messages import encode_defunct

          spec = importlib.util.spec_from_file_location('ledger_api', 'zaire-axis/ledger_api.py')
          m = importlib.util.module_from_spec(spec)
          sys.modules['ledger_api'] = m
          spec.loader.exec_module(m)
          client = TestClient(m.app)

          # Seed a surplus harvest event so the claim can be fulfilled
          r = client.post('/harvests', json={
            'tray_id': 'tray1', 'crop_type': 'Basil', 'harvest_g': 300.0,
            'water_ml': 110.0, 'sunlight_lux': 9000.0, 'soil_moisture': 75.0,
            'agape_value': 95.0
          })
          assert r.status_code == 201, r.text

          # Generate a real EIP-191 signature using a throwaway key
          acct = Account.create()
          wallet = acct.address
          tray   = 'tray1'
          msg    = f'VinelandEternal Claim: {wallet} tray {tray}'
          sig    = acct.sign_message(encode_defunct(text=msg)).signature.hex()

          r = client.post('/claim', json={
            'wallet_address': wallet,
            'signature': '0x' + sig,
            'tray_id': tray,
          })
          assert r.status_code == 200, r.text
          data = r.json()
          assert data['status'] == 'fulfilled', f'Expected fulfilled, got: {data}'
          assert data['token_id'] is not None
          assert data['surplus_at_claim'] >= 90.0

          # Invalid signature must return 400
          r_bad = client.post('/claim', json={
            'wallet_address': wallet,
            'signature': '0xdeadbeef',
            'tray_id': tray,
          })
          assert r_bad.status_code == 400, f'Expected 400 for bad sig, got {r_bad.status_code}'

          # Mismatched wallet must return 403
          other = Account.create()
          sig2  = other.sign_message(encode_defunct(text=msg)).signature.hex()
          r_mismatch = client.post('/claim', json={
            'wallet_address': wallet,
            'signature': '0x' + sig2,
            'tray_id': tray,
          })
          assert r_mismatch.status_code == 403, f'Expected 403 for mismatch, got {r_mismatch.status_code}'

          print('claim endpoint: all tests passed')
          "

      - name: Run gitnexus mapper tests
        run: |
          python -c "
          import json, sys
          from pathlib import Path
          sys.path.insert(0, '.')
          import gitnexus_mapper as gn

          # build_nexus_graph with real repo, no DB (harvest nodes skipped)
          G = gn.build_nexus_graph(Path('.'), Path('/nonexistent/zaire-ledger.db'), max_commits=20)
          assert G.number_of_nodes() > 0, 'Graph must have commit nodes'
          commit_nodes = [n for n, d in G.nodes(data=True) if d.get('node_type') == 'commit']
          assert len(commit_nodes) > 0, 'No commit nodes found'

          data = gn.graph_to_dict(G)
          assert 'generated_at' in data
          assert data['node_count'] == G.number_of_nodes()
          assert data['edge_count'] == G.number_of_edges()
          assert all('id' in n for n in data['nodes'])

          # Serialisable to JSON without error
          json.dumps(data)

          print(f'gitnexus_mapper.py: graph OK — {data[\"node_count\"]} nodes, {data[\"edge_count\"]} edges')
          "

      - name: Run chronicle generator tests
        run: |
          python -c "
          from datetime import datetime, timezone
          import sys
          sys.path.insert(0, 'docs/chronicles')
          from generate_chronicle import generate_chronicle

          now   = datetime.now(tz=timezone.utc)
          trays = [
            {'tray_id': 'tray1', 'crop': 'Basil',    'water': 85, 'soil': 72, 'sun': 92, 'agape_value': 97},
            {'tray_id': 'tray2', 'crop': 'Arugula',  'water': 60, 'soil': 55, 'sun': 70, 'agape_value': 62},
          ]
          md = generate_chronicle(trays, now)
          assert '# VinelandEternal Daily Chronicle' in md
          assert 'tray1' in md
          assert 'tray2' in md
          assert '🟢 Surplus' in md
          assert '🔴 Needs Attention' in md

          empty = generate_chronicle([], now)
          assert 'NO DATA' in empty

          print('generate_chronicle.py: all tests passed')
          "

  # -------------------------------------------------------------------------
  # 3. Node.js tests
  # -------------------------------------------------------------------------
  test-node:
    name: Node.js Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install drone-alchemy Node dependencies
        run: npm install --save-exact
        working-directory: drone-alchemy

      - name: Test heart-map.js
        run: |
          node -e "
          const { adaptSchedule, shiftTime, BASE_SCHEDULE, buildJSON } = require('./cosmic-coop/heart-map.js');
          const t1 = shiftTime('08:30', 30);
          if (t1 !== '09:00') throw new Error('shiftTime failed: ' + t1);
          const t2 = shiftTime('23:45', 30);
          if (t2 !== '23:59') throw new Error('shiftTime clamp failed: ' + t2);
          const highSurplus = adaptSchedule(BASE_SCHEDULE, { surplusCount: 4, dayOfWeek: 1 });
          const harvestBlock = highSurplus.find(b => b.domain === 'harvest');
          if (!harvestBlock.label.includes('HIGH SURPLUS')) throw new Error('Harvest label not updated');
          const sunday = adaptSchedule(BASE_SCHEDULE, { surplusCount: 0, dayOfWeek: 0 });
          if (!sunday.filter(b => b.label.startsWith('[Rest Day]')).length) throw new Error('Sunday rest mode not applied');
          const map = buildJSON(BASE_SCHEDULE, [], { surplusCount: 2, dayOfWeek: 2 }, new Date());
          if (!map.daily_rhythm || !Array.isArray(map.daily_rhythm)) throw new Error('buildJSON structure invalid');
          console.log('heart-map.js: all tests passed');
          "

      - name: Test flight-mint.js (dry-run / mock mode)
        run: |
          node -e "
          const { mintHarvestToken } = require('./drone-alchemy/flight-mint.js');
          const flight = {
            flight_id: 'test-001', tray_id: 'tray1', crop_type: 'Basil',
            surplus_g: 300, distance_km: 2.5, carbon_saved_g: 90, agape_value: 95,
            recipient: '0x0000000000000000000000000000000000000001',
          };
          mintHarvestToken(flight).then(result => {
            if (!result.tokenURI) throw new Error('tokenURI missing');
            if (!result.tokenURI.startsWith('ipfs://')) throw new Error('tokenURI not IPFS: ' + result.tokenURI);
            console.log('flight-mint.js: dry-run passed', result.tokenURI);
          }).catch(err => { throw err; });
          "

  # -------------------------------------------------------------------------
  # 4. SQL schema validation
  # -------------------------------------------------------------------------
  test-sql:
    name: SQL Schema Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Validate agape-ledger.sql (SQLite)
        run: |
          sqlite3 /tmp/agape-test.db < iot-agape/agape-ledger.sql
          sqlite3 /tmp/agape-test.db "SELECT COUNT(*) FROM trays;" | grep -q "^5$"
          echo "agape-ledger.sql: schema valid, 5 seed trays"

      - name: Validate infinite-tracker.sql (SQLite)
        run: |
          sqlite3 /tmp/infinite-test.db < zaire-axis/infinite-tracker.sql
          sqlite3 /tmp/infinite-test.db "SELECT COUNT(*) FROM operators;" | grep -q "^1$"
          echo "infinite-tracker.sql: schema valid, 1 seed operator"

  # -------------------------------------------------------------------------
  # 5. Smart-contract compile & test (Hardhat)
  # -------------------------------------------------------------------------
  test-contracts:
    name: Smart Contract Tests (Hardhat)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Compile contracts
        run: npm run compile

      - name: Run Hardhat test suite
        run: npm test

  # -------------------------------------------------------------------------
  # 6. Deploy to Vercel (production — main branch only)
  # -------------------------------------------------------------------------
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: [test-python, test-node, test-sql, test-contracts]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via Vercel CLI
        run: |
          if [ -z "${{ secrets.VERCEL_TOKEN }}" ]; then
            echo "VERCEL_TOKEN not set — skipping Vercel deployment."
            echo "Add VERCEL_TOKEN, VERCEL_ORG_ID, and VERCEL_PROJECT_ID to repository secrets to enable auto-deploy."
          else
            npm install -g vercel
            vercel --token "${{ secrets.VERCEL_TOKEN }}" \
                   --yes \
                   --prod \
                   --env DASHBOARD_URL="${{ secrets.DASHBOARD_URL }}"
          fi
        env:
          VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
