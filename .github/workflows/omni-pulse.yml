name: Omni-Pulse — Daily Agape Chronicle

on:
  schedule:
    # Every day at 05:00 UTC (Vineland Dawn Pulse)
    - cron: "0 5 * * *"
  workflow_dispatch:

# Write access is required so the workflow can commit the daily chronicle.
permissions:
  contents: write

jobs:
  chronicle:
    name: Generate Daily Chronicle
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          # Use the built-in GITHUB_TOKEN so the auto-commit triggers
          # downstream workflows normally.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install flask paho-mqtt

      - name: Generate daily chronicle
        run: python docs/chronicles/generate_chronicle.py

      - name: Commit and push chronicle
        run: |
          git config user.name  "omni-pulse[bot]"
          git config user.email "omni-pulse@vinelandeternal.local"
          git add docs/chronicles/
          if git diff --staged --quiet; then
            echo "Chronicle already up-to-date — nothing to commit."
          else
            git commit -m "chore(chronicle): daily agape state $(date -u +%Y-%m-%d)"
            git push
          fi
